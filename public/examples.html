<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="manifest" href="manifest.web" />
  <title>Matrix Engine Powered by webGPU. Created by Nikola Lukic zlatnaspirala@gmail.com </title>
  <meta name="description" content="The benefits of this project is offering an overview of the entire application logic, easy native implementations (hybrid app), object structural. " />
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <!-- <link defer rel="stylesheet" href="css/style.css" /> -->
   <link defer rel="stylesheet" href="css/mobile.css" />
  <link rel="apple-touch-icon" href="res/icons/512.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" sizes="256x256" href="res/icons/512.webp" />
</head>

<body allow="autoplay">
  <div class="header" style="display: contents;text-align: center;font-size: large;">
    MATRIX-ENGINE-WGPU WORKSPACE 2026 <span>Tested on chrome, android chrome.</span> <a style="font-size: x-small;" href="https://github.com/zlatnaspirala/matrix-engine-wgpu">Source and Credits github project</a>
  </div>
  <div id="examples" style="left: 0;display: flex; flex-direction: column;width: 180px;position: absolute;">
    <button class="btn" style="font-size: 15px;width: 210px;text-align: end;" id="sliderMenu1">Matrix EngineWGPU 👉🏼</button>
    <button class="btn" id="loadObjFile">Load meshes</button>
    <button class="btn" id="physicsPlayground">Physics AMMO</button>
    <button class="btn" id="test-jolt">Physics JOLT</button>
    <button class="btn" id="test-cannones">Physics CannonES</button>
    <button class="btn" id="objs-anim">Objs Sequence</button>
    <button class="btn" id="video-texture">Video texture</button>
    <button class="btn" id="camera-texture">Camera texture</button>
    <button class="btn" id="glb-loader">GLB loader</button>
    <button class="btn" id="procedural-mesh">Procedural-mesh-morph</button>
    <button class="btn" id="fontana">Fontana</button>
    <button class="btn" id="myLights">My Lights</button>
    <button class="btn" id="snake-light">Snake Lights</button>
    <button class="btn" id="snake-light-instanced">Snake Lights - Instanced</button>
    <button class="btn" id="flipper-jolt">Flipper (Jolt)</button>
    <button class="btn" id="flipper-ammo">Flipper (Ammo)</button>
    <button class="btn" id="maze">Maze game</button>
    <button class="btn" id="jamb">Jamb game</button>
    <button class="btn" id="moba">MOBA game</button>
  </div>
  <script src="examples.js"></script>
  <script>
    document.getElementById('sliderMenu1').addEventListener('click', () => {
      if(document.getElementById('examples').style.left == "0px") {
        document.getElementById('examples').style.left = "-150px";
      } else {
        document.getElementById('examples').style.left = "0px";
      }
    }, {passive: true});
  </script>
</body>

</html>
